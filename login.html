<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Volunteer Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

     <div class="header">
        <div class="header-center">
            <div class="header-icon">✿</div>
            <div class="header-title">Volunteer Management System</div>
        </div>
    </div>

    <div class="introduction">
        <div class="welcome">
        </div>
    </div>

    <div class="center">
        <div class="signup-login-rectangle">
            <h1 class="call-to-action">Welcome! Please login. </h1>

            <form action="/login" method="POST">
                <div class="input-fields">
                    <input type="text" id="username" name="username" placeholder="Username or Email" required>
                    <input type="password" id="password" name="password" placeholder="Password" required>
                </div>

                <a href="ForgetPassword.html" class="forgot-password">Forgot Password?</a>

                <button type="submit" class="sign-up"> Log In </button>
            </form>

        </div>
    </div>

    <div class="footer">
        <span class="footer-title">✿ Volunteer Management System</span>
        <span>Thank you for visiting!</span>
    </div>

</body>
</html>
