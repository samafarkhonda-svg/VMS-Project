<!DOCTYPE html>
<html>
<head>
    <title>Login - VMS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #eeeeee;
        }

        /* HEADER */
        .header {
            background-color: #f4a300;
            text-align: center;
            padding: 20px;
        }

        .logo {
            font-weight: bold;
            margin-top: 5px;
        }

        /* MAIN CARD */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        .card {
            background-color: #f3f3f3;
            width: 400px;
            padding: 40px;
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: gray;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin: 15px 0 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background-color: #f5d7a1;
            font-size: 14px;
        }

        .forgot {
            text-align: right;
            margin-top: 10px;
            font-size: 13px;
            color: gray;
            cursor: pointer;
        }

        .btn-container {
            text-align: right;
            margin-top: 20px;
        }

        .btn {
            background-color: black;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #333;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div>✿</div>
    <div class="logo">Volunteer Management System</div>
</div>

<!-- LOGIN FORM -->
<div class="container">
    <div class="card">

        <h1>Welcome back!</h1>
        <div class="subtitle">Please enter your details</div>

        <label>Email</label>
        <input type="text" placeholder="Enter your email">

        <label>Password</label>
        <input type="password" placeholder="Enter your password">

        <div class="forgot">Forgot password?</div>

        <div class="btn-container">
            <button class="btn" onclick="login()">Log In</button>
        </div>

    </div>
</div>

<script>
function login() {
    alert("Login successful (demo)");
}
</script>

</body>
</html>
