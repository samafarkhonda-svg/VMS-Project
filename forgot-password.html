<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Volunteer Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="header">
        <a href="login.html" class="back-button">&#8592;</a>

        <div class="header-center">
            <div class="header-icon">✿</div>
            <div class="header-title">Volunteer Management System</div>
        </div>
    </div>

    <div class="forgot-password-container">
        <h1>Forgot Password</h1>
        <p class="forgot-description">
            To recover your password, enter the email you signed up with.
        </p>

        <form>
            <input 
                type="email" 
                class="forgot-email-input" 
                placeholder="Enter your email"
                required>
            <br>
            <button type="submit" class="forgot-submit">Submit</button>
        </form>
    </div>

    <div class="footer">
        <span class="footer-title">✿ Volunteer Management System</span>
        <span>Thank you for visiting!</span>
    </div>

</body>
</html>
