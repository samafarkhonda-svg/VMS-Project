<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  
  <!-- LEFT PANEL -->
  <div class="sidebar">
    <div class="top-bar">
      <button class="back-btn">←</button>
      <span class="signout">sign out</span>
    </div>

    <h2>Profile Photo</h2>

    <div class="photo-box">
      <img id="profileImage" src="images/profile.png" alt="Profile">
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="form-area">
    <form>

      <div class="row">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="firstName" readonly>
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="lastName" readonly>
        </div>
      </div>

      <div class="field full">
        <label>Email Address</label>
        <input type="text" id="email" readonly>
      </div>

      <div class="row">
        <div class="field">
          <label>Phone Number</label>
          <input type="text" id="phone" readonly>
        </div>
        <div class="field">
          <label>Birth Date</label>
          <input type="text" id="birthDate" readonly>
        </div>
      </div>
      <div class="field full">
        <label>Address</label>
        <input type="text" id="address" readonly>
      </div>
      <div class="row">
        <div class="field">
          <label>City</label>
          <input type="text" id="city" readonly>
        </div>
        <div class="field">
          <label>State</label>
         <input type="text" id="state" readonly>
        </div>
        <div class="field">
          <label>Zip Code</label>
  	  <input type="text" id="zip" readonly>
        </div>
      </div>

      <div class="field full">
        <label>Bio</label>
        <textarea id="bio" readonly></textarea>
      </div>

      <div class="submit-row">
        <button class="save-btn" onclick="window.location.href='account_display_modify.html'">
         Edit Profile
        </button>
      </div>

    </form>
  </div>

</div>

<!-- ✅ JAVASCRIPT -->
<script>

// Load profile from backend
async function loadProfile() 
{
  try 
  {
    const response = await fetch("http://localhost:8080/api/profile");
    if (!response.ok) 
    {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    const data = await response.json();

    // Use .value for input elements (not .textContent)
    document.getElementById("firstName").value = data.firstName || "";
    document.getElementById("lastName").value = data.lastName || "";
    document.getElementById("email").value = data.email || "";
    document.getElementById("phone").value = data.phone || "";
    document.getElementById("birthDate").value = data.birthDate || "";
    document.getElementById("address").value = data.address || "";
    document.getElementById("city").value = data.city || "";
    document.getElementById("state").value = data.state || "";
    document.getElementById("zip").value = data.zip || "";
    document.getElementById("bio").value = data.bio || "";

    // Optional: load profile image
    if (data.imageUrl) 
    {
      document.getElementById("profileImage").src = data.imageUrl;
    }
  } 
  catch (error) 
  {
    console.error("Error loading profile:", error);
    alert("Failed to load profile. Please try again.");
  }
}

// Run on page load
window.addEventListener("load", loadProfile);

</script>

</body>
</html>
