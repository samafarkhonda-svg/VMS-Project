<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Form</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  
  <!-- LEFT PANEL -->
  <div class="sidebar">
    <div class="top-bar">
      <button class="back-btn">←</button>
      <span class="signout">sign out</span>
    </div>

    <h2>Profile Photo</h2>
    <div class="photo-box">
      <img id="profileImage" src="images/profile.png" alt="Profile">
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="form-area">
    <form>

      <div class="row">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="firstName">
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="lastName">
        </div>
      </div>

      <div class="field full">
        <label>Email Address</label>
        <input type="email" id="email">
      </div>

      <div class="row">
        <div class="field">
          <label>Phone Number</label>
          <input type="text" id="phone">
        </div>
        <div class="field">
          <label>Birth Date</label>
          <input type="text" id="birthDate">
        </div>
      </div>

      <div class="field full">
        <label>Address</label>
        <input type="text" id="address">
      </div>

      <div class="row">
        <div class="field">
          <label>City</label>
          <input type="text" id="city">
        </div>
        <div class="field">
          <label>State</label>
          <input type="text" id="state">
        </div>
        <div class="field">
          <label>Zip Code</label>
          <input type="text" id="zip">
        </div>
      </div>

      <div class="field full">
        <label>Bio</label>
        <textarea id="bio"></textarea>
      </div>

      <div class="field full">
        <label>Registered Events</label>
        <div id="registeredEventsList" style="padding: 12px; border-radius: 10px; min-height: 60px; background: #e6c68b;">
          <p id="noEventsMessage">No events registered yet.</p>
        </div>
      </div>

      <div class="submit-row">
	<!-- Pressing the button saves changes -->
        <button type="button" class="save-btn" onclick="saveProfile()">Save changes</button>
      </div>

    </form>
  </div>

</div>

<!-- ✅ JAVASCRIPT -->
<script>

// Load profile from backend
async function loadProfile() {
  try {
    const response = await fetch("http://localhost:8080/api/profile");
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    const data = await response.json();

    document.getElementById("firstName").value = data.firstName || "";
    document.getElementById("lastName").value = data.lastName || "";
    document.getElementById("email").value = data.email || "";
    document.getElementById("phone").value = data.phone || "";
    document.getElementById("birthDate").value = data.birthDate || "";
    document.getElementById("address").value = data.address || "";
    document.getElementById("city").value = data.city || "";
    document.getElementById("state").value = data.state || "";
    document.getElementById("zip").value = data.zip || "";
    document.getElementById("bio").value = data.bio || "";

    // Optional: load profile image
    if (data.imageUrl) {
      document.getElementById("profileImage").src = data.imageUrl;
    }

  } catch (error) {
    console.error("Error loading profile:", error);
    alert("Failed to load profile. Please try again.");
  }
}

// Save profile to backend
async function saveProfile() {
  const profile = {
    firstName: document.getElementById("firstName").value,
    lastName: document.getElementById("lastName").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    birthDate: document.getElementById("birthDate").value,
    address: document.getElementById("address").value,
    city: document.getElementById("city").value,
    state: document.getElementById("state").value,
    zip: document.getElementById("zip").value,
    bio: document.getElementById("bio").value
  };

  try 
  {
    const response = await fetch("http://localhost:8080/api/profile", 
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(profile)
    });

    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }

    alert("Profile saved successfully!");
    window.location.href = "account_display.html";

  } 
  catch (error) 
  {
    console.error("Error saving profile:", error);
    alert("Failed to save profile. Please try again.");
  }
}

// Load registered events from backend
async function loadRegisteredEvents() {
  try {
    const response = await fetch("http://localhost:8080/api/events/registered");
    if (!response.ok) {
      throw new Error(`HTTP error! status: ${response.status}`);
    }
    const data = await response.json();
    const eventIds = data.eventIds || [];

    // Fetch event details for the registered events
    if (eventIds.length > 0) {
      const eventsList = document.getElementById("registeredEventsList");
      const noEventsMessage = document.getElementById("noEventsMessage");

      // Fetch details for each event
      const eventDetailsPromises = eventIds.map(eventId =>
        fetch(`http://localhost:8080/api/events/${eventId}`)
          .then(res => res.json())
          .catch(err => {
            console.error(`Error fetching event ${eventId}:`, err);
            return { id: eventId, title: `Event ${eventId}` };
          })
      );

      const eventDetails = await Promise.all(eventDetailsPromises);

      // Create HTML for each event
      const eventsHTML = eventDetails
        .map(event => `<div style="padding: 8px; margin: 5px 0; background-color: #fff; border-left: 4px solid #ff9800; border-radius: 3px;">• ${event.title || `Event ${event.id}`}</div>`)
        .join("");

      noEventsMessage.style.display = "none";
      eventsList.innerHTML = eventsHTML || "<p>No events found.</p>";
    }
  } catch (error) {
    console.error("Error loading registered events:", error);
    // Don't show alert for events - just log the error
  }
}

// Run on page load
window.addEventListener("load", () => 
{
  loadProfile();
  loadRegisteredEvents();
});
</script>

</body>
</html>
